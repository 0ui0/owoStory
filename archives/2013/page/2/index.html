<script>
  document.addEventListener('DOMContentLoaded', function () {
    var trigger = document.getElementById('sidebar-trigger');
    var wall = document.getElementById('sidebar-wall');
    
    // --- 新增：动态计算手机端导航扇形排版 ---
    function updateMobileNav() {
      if (window.innerWidth <= 768) {
        var navList = document.querySelector('.nav-list');
        var items = navList ? navList.querySelectorAll('.nav-item') : [];
        var n = items.length;
        if (n > 0) {
          var alpha = 90 / n;
          var R = 160 * (2 / 3); // 虚拟圆半径为实际圆半径(160)的2/3

          items.forEach(function(item, i) {
            // 切割扇形，取中线角度 (基于水平0度到垂直90度)
            var angle = (i + 0.5) * alpha;
            var rad = angle * Math.PI / 180;
            
            // 屏幕左下角(0,0)为原点的绝对坐标
            var x_screen = R * Math.cos(rad);
            var y_screen = R * Math.sin(rad);
            
            // 转换到 .nav-list 本地坐标 (基于屏幕 60,60 的偏移)
            var tx = x_screen - 60;
            var ty = 60 - y_screen; // CSS 中 Y轴向下为正
            
            // 平移到交点，由于 CSS 已设置 transform-origin: 0 50%，translateY(-50%) 会精确定位左侧中点
            item.style.transform = 'translate(' + tx + 'px, ' + ty + 'px) translateY(-50%) rotate(' + (-angle) + 'deg)';
          });
        }
      } else {
        // PC端清除内联样式
        document.querySelectorAll('.nav-item').forEach(function(item) {
          item.style.transform = '';
        });
      }
    }
    
    updateMobileNav();
    window.addEventListener('resize', updateMobileNav);
    // ----------------------------------------

    if (trigger && wall) {
      trigger.addEventListener('click', function (e) {
        if (window.innerWidth <= 768) {
          if (e.target.tagName.toLowerCase() !== 'a' && !e.target.closest('a')) {
            e.preventDefault();
            e.stopPropagation();
            wall.classList.toggle('expanded');
          }
        }
      });
    }
  });
</script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // 拦截九宫格 <a> 标签的默认在新窗口打开大图行为，改为触发内部图片的 click 激活 Viewer.js
      document.addEventListener('click', function(e) {
        var link = e.target.closest('.post-thumb-link');
        if (link) {
          e.preventDefault();
          var img = link.querySelector('img');
          if (img) {
            img.click();
          }
        }
      });

      // 初始化 Viewer.js
      var containers = document.querySelectorAll('.post-content, .post-card-excerpt, .post-card-thumbs');
      containers.forEach(function(container) {
        new Viewer(container, {
          // 仅过滤出文章内容或摘要中的大图，排除立绘与背景小图标
          filter: function(image) {
            return !image.closest('.sniper-boy-fg') && !image.closest('.sitting-boy-bg');
          },
          // 适应屏幕模式
          viewMode: 1, 
          // 允许放大至 10 倍，便于看清长图小字
          maxZoomRatio: 10,
          minZoomRatio: 0.1,
          // 工具栏配置：显示全部实用的缩放、旋转和翻转功能
          toolbar: {
            zoomIn: 1,
            zoomOut: 1,
            oneToOne: 1,
            reset: 1,
            prev: 1,
            next: 1,
            rotateLeft: 1,
            rotateRight: 1,
            flipHorizontal: 1,
            flipVertical: 1
          }
        });
      });
    });
  </script>
