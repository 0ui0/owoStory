menu:
  首页: /
  归档: /archives
  关于: /about

# 页面主题主色调蓝色
#theme_color: '#2C77AE'
#theme_color: '#9169AF'
theme_color: '#746FDF'

# 导航栏悬浮角色立绘与背景淡影立绘配置
character:
  foreground: images/scaramouche-fg3.png     # 前景悬浮角色立绘
  background: images/scaramouche-bg.png     # 背景淡影角色立绘
  # PC端前景立绘的定位与大小参数 (请包含单位 vh, px, vw 等)
  pc:
    left: 30vh      # 往左移使其缩入大蓝圆内，以防挡住右侧卡片内容 (默认 35vh)
    height: 95vh    # 稍微调整高度，以防太逼近可视区上下边缘 (默认 96vh)
    bottom: 0px
  # 移动端前景立绘的定位与大小参数
  mobile:
    left: 0vh
    height: 100vh
    bottom: 0px

  # 右侧背景淡影的定位、大小和透明度参数
  bg:
    pc:
      left: 32vw      # PC端距左侧偏移量 (默认 32vw)
      width: 68vw     # PC端宽度 (默认 68vw)
      bottom: 0px     # PC端距底部偏移 (默认 0px)
      opacity: 0.12   # 背景淡影透明度 (默认 0.12，范围 0-1)
    mobile:
      left: 0vw       # 移动端距左侧偏移量 (设为0vw配合居中铺满)
      right: 0vw      # 移动端距右侧偏移量 (设为0vw配合居中铺满)
      bottom: -5vh    # 移动端距底部偏移 (默认 -5vh)
      width: 100vw    # 移动端宽度设为 100vw 以完全占满屏幕宽度
      opacity: 0.15   # 移动端背景淡影透明度 (默认 0.15)

